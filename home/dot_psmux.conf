# Static psmux expansion of gpakosz/.tmux plus .tmux.conf.local.
#
# oh-my-tmux generates its final configuration through POSIX shell. Native
# Windows psmux understands tmux commands and formats, but does not execute that
# generator. Keep this file declarative so psmux can load the equivalent result
# directly while real tmux continues to use ~/.tmux.conf.

# -- shell and general behavior ------------------------------------------------

set -g default-shell nu
set -g default-terminal "screen-256color"
set -g escape-time 10
set -g focus-events on

set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

set -g history-limit 5000
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#h ❐ #S ● #I #W"

set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10
set -g monitor-activity on
set -g visual-activity off

# Match the tmux default used by the current oh-my-tmux local configuration.
set -g mouse off
set -g status-keys vi
set -g mode-keys vi
set -g cursor-style block
set -g cursor-blink off

# -- editing and reload --------------------------------------------------------

bind e new-window -n .psmux.conf nvim ~/.psmux.conf
bind r source-file ~/.psmux.conf \; display-message "~/.psmux.conf sourced"

# -- navigation ---------------------------------------------------------------

# psmux 3.3.6 checks root bindings before an armed prefix. Leave bare C-l to
# Nushell so it cannot preempt the Prefix + C-l next-window binding below.

bind C-c new-session
bind C-f command-prompt -p find-session "switch-client -t %%"
bind BTab switch-client -l

bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U
bind + resize-pane -Z

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind -r C-S-H swap-window -t -1 \; select-window -t -1
bind -r C-S-L swap-window -t +1 \; select-window -t +1
bind Tab last-window

bind m if-shell -F "#{?mouse,1,0}" "set-option -g mouse off" "set-option -g mouse on"

# -- copy mode and buffers -----------------------------------------------------

bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

bind y run-shell -b "psmux save-buffer - | Set-Clipboard"
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# -- oh-my-tmux theme ----------------------------------------------------------

set -g window-style "fg=default,bg=default"
set -g window-active-style "fg=default,bg=default"
set -g pane-border-style "fg=#303030,bg=default"
set -g pane-active-border-style "fg=#00afff,bg=default"

set -g message-style "fg=#080808,bg=#ffff00,bold"
set -g message-command-style "fg=#ffff00,bg=#080808,bold"
set -g mode-style "fg=#080808,bg=#ffff00,bold"

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#8a8a8a,bg=#080808,none"
set -g status-left-style "fg=#8a8a8a,bg=#080808,none"
set -g status-right-style "fg=#8a8a8a,bg=#080808,none"
set -g status-left-length 1000
set -g status-right-length 1000
set -g status-left '#[fg=#080808,bg=#ffff00,bold] ❐ #S #[none,fg=#ffff00,bg=#080808] '
set -g status-right '#[none,fg=#8a8a8a,bg=#080808] #{?client_prefix,⌨ ,  }#{?mouse,↗ ,  }#{?session_many_attached,⚇ ,}#{?pane_synchronized,⚏ ,} | %R | %d %b #[none,fg=#e4e4e4,bg=#d70000] #{user} #[fg=#080808,bg=#e4e4e4,bold] #{host_short} '

set -g window-status-style "fg=#8a8a8a,bg=#080808,none"
set -g window-status-current-style "fg=#080808,bg=#00afff,bold"
set -g window-status-activity-style "fg=default,bg=default,underscore"
set -g window-status-bell-style "fg=#ffff00,bg=default,blink,bold"
set -g window-status-last-style "fg=#00afff,bg=#303030,none"
set -g window-status-separator " "

set -g clock-mode-colour "#00afff"
set -g clock-mode-style 24

# psmux's ordinary three-part renderer truncates the assembled line from the
# right when the window list grows. Its status-format list viewport is the tmux-
# compatible path that keeps both edges fixed, scrolls around the active window,
# and emits < / > overflow markers.
set -g status-format[0] '#[align=left]#[fg=#080808,bg=#ffff00,bold] ❐ #S #[none,fg=#ffff00,bg=#080808] #[list=left-marker]#[fg=#ffff00,bg=#080808,bold]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{e|-:#{window_index},1}]#{?window_active,#[list=focus]#[fg=#080808,bg=#00afff,bold] #I #W #[none,fg=#8a8a8a,bg=#080808],#[none,fg=#8a8a8a,bg=#080808]#I #W}#[norange]}#[nolist]#[align=right]#[none,fg=#8a8a8a,bg=#080808] #{?client_prefix,⌨ ,  }#{?mouse,↗ ,  }#{?session_many_attached,⚇ ,}#{?pane_synchronized,⚏ ,} | %R | %d %b #[none,fg=#e4e4e4,bg=#d70000] #{user} #[fg=#080808,bg=#e4e4e4,bold] #{host_short} '
