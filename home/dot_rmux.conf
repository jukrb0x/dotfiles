# ~/.rmux.conf — native rmux config (Windows).
# Ported from the oh-my-tmux (gpakosz/.tmux) setup used on Linux/macOS.
# Managed by chezmoi: source home/dot_rmux.conf. rmux can't run oh-my-tmux's
# shell/format-job framework, so this reproduces the *intent*, not the files.

# -- core ----------------------------------------------------------------------
set -g prefix2 C-a                 # keep C-b primary, add C-a (oh-my-tmux style)
bind C-a send-prefix -2            # prefix then C-a sends a literal C-a
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 5000
setw -g mode-keys vi

# -- redraw / latency (nvim-tree glitch mitigations) ---------------------------
set -sg escape-time 10             # rmux default is 500
set -g focus-events on             # rmux default is off

# -- truecolor -----------------------------------------------------------------
# Windows Terminal / WezTerm support RGB; enables the accent colour below.
set -as terminal-features ",xterm-256color:RGB"

# -- keybinds ------------------------------------------------------------------
# splits retain current path
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# repeatable pane resize
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# reload config
bind r source-file ~/.rmux.conf \; display "rmux.conf reloaded"

# -- status line (visual port of the oh-my-tmux theme) -------------------------
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#080808,fg=#8a8a8a"
set -g status-left "#[fg=#00afff,bold] ❐ #S #[default]"
set -g status-left-length 30
set -g status-right "#[fg=#8a8a8a] %R  %d %b #[fg=#00afff]| #{host_short} "
set -g status-right-length 60
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[fg=#080808,bg=#00afff,bold] #I #W #[default]"
