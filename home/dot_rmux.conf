# ~/.rmux.conf — native rmux config (Windows), aligned with oh-my-tmux.
# Ported from gpakosz/.tmux. rmux can't run oh-my-tmux's shell/format-job
# framework (battery, uptime, #{username}, tpm, maximize, mouse-toggle script),
# so those are reproduced with native options/formats or omitted (noted below).
# Managed by chezmoi: source home/dot_rmux.conf.

# -- options (oh-my-tmux defaults) ---------------------------------------------
set -g prefix2 C-a                 # keep C-b primary, add C-a
bind C-a send-prefix -2
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
# RMUX-WORKAROUND BEGIN: status-click-pane-base-index
# Why: rmux 0.9's default MouseDown1Status uses `switch-client -t =`, which
# serializes the clicked window through its internal pane index. With
# pane-base-index=1 that internal `.0` is re-parsed as an invalid visible pane.
# Select the mouse window directly; this preserves tmux's left-click behavior.
bind -n MouseDown1Status select-window -t =
# RMUX-WORKAROUND END: status-click-pane-base-index
set -g renumber-windows on
setw -g automatic-rename on
set -g history-limit 5000
set -g repeat-time 600
set -s escape-time 10
set -s focus-events on
set -g status-interval 10
set -g display-time 1000
set -g display-panes-time 800
set -g monitor-activity on
set -g visual-activity off
set -g set-titles on
set -g set-titles-string "#h ❐ #S ● #I #W"
setw -g mode-keys vi
set -g set-clipboard on
# Native rmux copy-mode actions pipe selections directly to Windows clipboard.
set -s copy-command 'clip.exe'

# -- Windows terminal features & Nushell input ---------------------------------
# Native Windows Terminal leaves outer TERM unset. rmux 0.9 therefore skips
# terminal-features patterns, but its Windows client already detects sync,
# bracketed paste, mouse, and clipboard support. rmux preserves RGB sequences;
# Claude Code separately downgrades whenever TMUX is present unless explicitly
# opted back into truecolor. Remove this when Claude no longer needs the flag.
set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR 1
# WT-backed rmux does support 24-bit colour; advertise that capability to pane
# applications which use COLORTERM instead of inspecting escape-sequence support.
set-environment -g COLORTERM truecolor
# rmux 0.8.0 discards the named C-d token for direct Windows programs. The root
# binding below sends byte 0x04 through the raw hex path, so panes can run Nu
# directly. Leave window naming on rmux's standard pane-command format; terminal
# titles can contain full paths and are not suitable as window labels.
set -g default-command "nu"
set -g automatic-rename-format "#{pane_current_command}"

# -- keybinds (oh-my-tmux) -----------------------------------------------------
unbind '"'
unbind %
unbind n
unbind p
# splits and windows keep cwd and launch native Nu (- vertical, _ horizontal)
bind - split-window -v -c "#{pane_current_path}" "nu"
bind _ split-window -h -c "#{pane_current_path}" "nu"
bind | split-window -h -c "#{pane_current_path}" "nu"
bind \\ split-window -h -c "#{pane_current_path}" "nu"
bind c new-window -c "#{pane_current_path}" "nu"
bind C-c new-session
# rmux creates an unspecified-size session as 80x24 and does not switch the
# invoking attached client. Switching in the lifecycle hook also reconciles the
# new session to that client's real terminal dimensions. Detached CLI callers
# have no client_name and intentionally do nothing.
set-hook -g after-new-session 'if-shell -F "#{client_name}" "switch-client -t #{session_name}"'
bind C-f command-prompt -p "find-session:" "switch-client -t '%%'"
bind Tab  last-window
bind BTab switch-client -l
# vim-style pane navigation + resize
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2
# window navigation & pane swap
bind -r C-h previous-window
bind -r C-l next-window
bind > swap-pane -D
bind < swap-pane -U
# copy mode / buffers
bind Enter copy-mode
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer
# mouse toggle (makes the ↗ status indicator meaningful)
bind m set -g mouse \; display "mouse #{?mouse,on,off}"
# reload
bind r source-file ~/.rmux.conf \; display "rmux.conf reloaded"
# Ctrl-L clears screen AND scrollback (oh-my-tmux, root table)
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history
# Bypass rmux 0.8.0's direct-Windows-program C-d Noop path with raw EOT.
bind -n C-d send-keys -H 04

# vi copy-mode selection (oh-my-tmux)
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter  send -X copy-pipe-and-cancel
bind -T copy-mode-vi C-c    send -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H      send -X start-of-line
bind -T copy-mode-vi L      send -X end-of-line
# yank selection to the Windows clipboard
bind y run -b 'rmux save-buffer - | clip.exe'

# -- theme (oh-my-tmux palette) ------------------------------------------------
# bg #080808  fg #8a8a8a  accent #00afff  yellow #ffff00  gray #303030
# white #e4e4e4  red #d70000
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style              "fg=#8a8a8a,bg=#080808"
set -g message-style             "fg=#080808,bg=#ffff00,bold"
set -g message-command-style     "fg=#ffff00,bg=#080808,bold"
setw -g mode-style               "fg=#080808,bg=#ffff00,bold"
setw -g pane-border-style        "fg=#303030"
set -g pane-active-border-style  "fg=#00afff"
set -g display-panes-colour        "#00afff"
set -g display-panes-active-colour "#00afff"
setw -g clock-mode-colour        "#00afff"
setw -g clock-mode-style         24

# left: session name on yellow (oh-my-tmux ❐)
set -g status-left-length 1000
set -g status-left "#[fg=#080808,bg=#ffff00,bold] ❐ #S #[fg=#ffff00,bg=#080808,none] "

# windows: current on the blue accent
setw -g window-status-separator      ""
setw -g window-status-style          "fg=#8a8a8a,bg=#080808"
setw -g window-status-format         " #I #W "
setw -g window-status-current-style  "fg=#080808,bg=#00afff,bold"
setw -g window-status-current-format " #I #W "
setw -g window-status-activity-style "underscore"
setw -g window-status-bell-style     "fg=#ffff00,blink,bold"
setw -g window-status-last-style     "fg=#00afff,bg=#303030"

# right: prefix (⌨ yellow) + mouse (↗) indicators, time | date, then the
#        oh-my-tmux red user and white host blocks. The explicit status-format
#        below keeps this styled region out of the flexible window-list bucket.
set -g status-right-length 1000
set -g status-right "#[fg=#8a8a8a,bg=#080808] #[fg=#ffff00]#{?client_prefix,⌨, }#[fg=#8a8a8a]#{?mouse,↗, } | %R | %d %b #[fg=#e4e4e4,bg=#d70000,bold] #{user} #[fg=#080808,bg=#e4e4e4,bold] #{host_short} "

# RMUX-WORKAROUND BEGIN: explicit-status-static-window-styles
# Why: rmux 0.9 copies each #[...] clause before expanding nested formats, so
# #{E:window-status-*-style} inside a style clause invalidates that entire
# clause. The inherited yellow status-left style then leaks across every tab.
# Keep the palette literal here until rmux expands formats inside style clauses.
# The explicit layout keeps both edges fixed and lets only the window list
# flex/scroll; list=focus keeps the active tab visible when the list is clipped.
# rmux does not expand nested formats inside #[...], so construct each click
# range as adjacent literal/format pieces. Target window_id (without its @), not
# window_index: indexes are renumbered while IDs remain valid mouse targets.
set -g status-format[0] "#[align=left range=left]#{T:status-left}#[norange]#[list=on align=left]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#{l:#[range=window|}#{s/@//:window_id}]#[none fg=#8a8a8a bg=#080808]#{?window_last_flag,#[fg=#00afff bg=#303030],} #{window_index} #{window_name} #[norange list=on],#{l:#[range=window|}#{s/@//:window_id}]#[list=focus none fg=#080808 bg=#00afff bold] #{window_index} #{window_name} #[norange list=on]}#[nolist align=right range=right]#{T:status-right}#[norange]"
# RMUX-WORKAROUND END: explicit-status-static-window-styles
